name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: MSVC build (${{ matrix.platform }})
    strategy:
      matrix:
        platform: [x64, ARM64]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore Notepad.sln

      - name: Build
        run: msbuild Notepad.sln /m /p:Configuration=Release /p:Platform=${{ matrix.platform }}

      - name: List build output
        shell: pwsh
        run: Get-ChildItem -Recurse "${{ matrix.platform }}/Release" | Select-Object FullName
