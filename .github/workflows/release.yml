name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - cmake_arch: x64
            asset_arch: x86_64
          - cmake_arch: ARM64
            asset_arch: arm64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A ${{ matrix.cmake_arch }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/Release/notepad.exe dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath "notepad-${{ github.ref_name }}-windows-${{ matrix.asset_arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notepad-windows-${{ matrix.asset_arch }}
          path: notepad-${{ github.ref_name }}-windows-${{ matrix.asset_arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: true
