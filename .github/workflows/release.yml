name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: x64
            asset_arch: x86_64
          - platform: ARM64
            asset_arch: arm64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore Notepad.sln

      - name: Build
        run: msbuild Notepad.sln /m /p:Configuration=Release /p:Platform=${{ matrix.platform }}

      - name: Package
        shell: pwsh
        run: |
          $out = "${{ matrix.platform }}/Release/Notepad"
          # Drop build byproducts that end users do not need.
          Remove-Item "$out/*.pdb", "$out/*.lib", "$out/*.exp", "$out/*.winmd", "$out/*.xml" -ErrorAction SilentlyContinue
          Copy-Item README.md $out/
          Copy-Item LICENSE $out/
          Compress-Archive -Path "$out/*" -DestinationPath "notepad-${{ github.ref_name }}-windows-${{ matrix.asset_arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notepad-windows-${{ matrix.asset_arch }}
          path: notepad-${{ github.ref_name }}-windows-${{ matrix.asset_arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: true
